name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run ruff
        run: |
          pip install ruff
          ruff check src/
      - name: Run vulture (dead code)
        run: |
          pip install vulture
          vulture src/ --min-confidence 80

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run mypy
        run: |
          pip install -e ".[dev]"
          pip install mypy
          mypy src/ --ignore-missing-imports

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Reduce matrix size: skip oldest Python on non-Linux
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --cov=src/memorygraph --cov-report=term
        env:
          COVERAGE_PROCESS_STARTUP: ${{ github.workspace }}/.coveragerc

      - name: Verify hook command (Linux only)
        if: runner.os == 'Linux'
        run: |
          mkdir -p /tmp/hook-test && cd /tmp/hook-test
          git init
          git config user.email "ci@test.com"
          git config user.name "CI Test"
          PYTHONPATH=$GITHUB_WORKSPACE/src python -m memorygraph.cli.main hook install
          test -f .git/hooks/pre-commit
          grep "memorygraph sync" .git/hooks/pre-commit
          PYTHONPATH=$GITHUB_WORKSPACE/src python -m memorygraph.cli.main hook uninstall
          test ! -f .git/hooks/pre-commit
          echo "=== Hook install/uninstall verified ==="

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pip-audit (dependency vulnerability scan)
        run: |
          pip install pip-audit
          pip install -e ".[dev]"
          pip-audit
      - name: Run bandit (static security analysis — Medium+ only)
        run: |
          pip install bandit
          bandit -r src/memorygraph/ -lll -x tests/ -s B608
          # -lll = Medium+ severity only (Low is acceptable)
          # -s B608 = skip SQL injection false positive in non-SQL context

  stress-test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install memorygraph
        run: pip install -e ".[dev]"
      - name: Stress test (1000 files)
        run: python -m pytest tests/test_bench_stress.py::TestStressIndexing::test_generate_and_index_1000_files -v -s

  benchmark-external:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install memorygraph
        run: pip install -e ".[dev]"
      - name: Benchmark on black
        run: |
          git clone --depth 1 https://github.com/psf/black.git /tmp/black-bench
          cd /tmp/black-bench && memorygraph init && time memorygraph index
      - name: Benchmark on flask
        run: |
          git clone --depth 1 https://github.com/pallets/flask.git /tmp/flask-bench
          cd /tmp/flask-bench && memorygraph init && time memorygraph index
